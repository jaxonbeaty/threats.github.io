name: Update Threat Dashboard

on:
  schedule:
    # 0 = minute 0, 8-17 = hours 8 AM through 5 PM
    - cron: '0 8-17 * * 1-5' 
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # <-- Fixed this line!

      - name: Run CISA update
        run: node update.js

      - name: Run Microsoft update
        run: node update-ms.js

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@users.noreply.github.com'
          git add issues.html
          git commit -m "Hourly Dashboard Update" || exit 0
          git push
