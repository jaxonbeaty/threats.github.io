<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Cybersecurity Threats (CISA KEV)</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2a2a35;
            --text-color: #f3f4f6;
            --accent-color: #3b82f6;
            --danger-color: #ef4444;
            --border-color: #3f3f46;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            font-size: 13px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-color);
        }

        .badge-cisa {
            background-color: var(--accent-color);
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--card-bg);
            color: #a1a1aa;
            font-weight: 600;
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .cve-link {
            color: #60a5fa;
            text-decoration: none;
            font-weight: bold;
        }

        .cve-link:hover {
            text-decoration: underline;
        }

        .ransomware-tag {
            display: inline-block;
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Active Global Threats</h2>
        <span class="badge-cisa">CISA KEV Feed</span>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 15%;">CVE ID</th>
                <th style="width: 20%;">Vendor / Product</th>
                <th style="width: 45%;">Vulnerability</th>
                <th style="width: 10%;">Added</th>
                <th style="width: 10%;">Ransomware?</th>
            </tr>
        </thead>
        <tbody id="threat-data">
            </tbody>
    </table>

</body>
</html>
